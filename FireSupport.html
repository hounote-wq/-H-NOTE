<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>FIRE SUPPORT SYSTEM</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Sarabun:wght@400;600;700&family=Orbitron:wght@700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#1a1d1e;font-family:'Share Tech Mono',monospace}

.top-bar{
  display:flex;align-items:center;justify-content:center;
  height:44px;background:linear-gradient(180deg,#2e3234 0%,#1e2122 100%);
  border-bottom:1px solid #444;position:relative;z-index:100;
  box-shadow:0 2px 8px rgba(0,0,0,0.5);
}
.top-title{
  font-family:'Orbitron',monospace;font-size:11px;font-weight:700;
  color:#ffd630;letter-spacing:3px;text-transform:uppercase;
  text-shadow:0 0 8px rgba(255,214,48,0.4);
}

.tab-bar{
  display:flex;height:42px;background:#252829;
  border-bottom:2px solid #333;position:relative;z-index:99;
}
.tab-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:none;border:none;border-bottom:3px solid transparent;
  color:#708090;font-family:'Share Tech Mono',monospace;font-size:10px;font-weight:700;
  cursor:pointer;transition:all .2s;letter-spacing:1.5px;text-transform:uppercase;
  padding:4px 2px;gap:1px;
}
.tab-btn .th{font-family:'Sarabun',sans-serif;font-size:11px;font-weight:600;letter-spacing:0}
.tab-btn.active{
  color:#ffd630;border-bottom-color:#ffd630;
  background:rgba(255,214,48,0.06);
  text-shadow:0 0 6px rgba(255,214,48,0.3);
}
.tab-btn:hover:not(.active){color:#b0b8c0;background:rgba(255,255,255,0.03)}

.app-frame{
  width:100%;height:calc(100% - 86px);border:none;display:block;
  background:#1a1d1e;
}

/* เพิ่ม CSS สำหรับเมนูหลัก */
.menu-btn{
  position:absolute;left:10px;top:6px;width:32px;height:32px;border-radius:6px;
  display:inline-flex;align-items:center;justify-content:center;gap:2px;
  background:linear-gradient(180deg,#232526,#151616);border:1px solid #333;
  color:#ffd630;cursor:pointer;font-family:'Share Tech Mono',monospace;
  box-shadow:0 2px 6px rgba(0,0,0,0.5);
}
.menu-btn:active{transform:translateY(1px)}
.menu-btn .bar{width:16px;height:2px;background:#ffd630;border-radius:2px;display:block}
.menu-btn .bar.mid{width:10px}

.main-menu{
  position:fixed;left:0;top:44px;bottom:0;width:220px;
  background:linear-gradient(180deg,#111315,#1b1e1f);
  border-right:1px solid rgba(255,214,48,0.06);z-index:200;
  transform:translateX(-100%);transition:transform .25s ease;
  box-shadow:2px 0 12px rgba(0,0,0,0.6);padding:12px 8px;
  display:flex;flex-direction:column;gap:8px;
}
.menu-open .main-menu{transform:translateX(0)}

.menu-overlay{
  position:fixed;left:0;top:44px;right:0;bottom:0;background:rgba(0,0,0,0.4);
  opacity:0;pointer-events:none;transition:opacity .2s;z-index:150;
}
.menu-open .menu-overlay{opacity:1;pointer-events:auto}

.menu-item{
  display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px;
  color:#cbd6d9;background:transparent;border:1px solid transparent;
  cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:13px;
}
.menu-item:hover{background:rgba(255,255,255,0.02)}
.menu-item .icon{width:28px;height:28;border-radius:6px;background:rgba(255,214,48,0.06);display:grid;place-items:center;color:#ffd630;font-weight:700}
.menu-item .label{font-family:'Sarabun',sans-serif;font-weight:600}
.menu-item.active{background:rgba(255,214,48,0.06);color:#ffd630;border-color:rgba(255,214,48,0.06)}
/* เว้นพื้นที่ด้านซ้ายของเนื้อหาเมื่อเมนูเปิด (เล็กๆ) */
@media (min-width:480px){
  .menu-open .app-frame{margin-left:220px;transition:margin .25s}
}

</style>
</head>
<body>

<div class="top-bar">
  <button id="menuBtn" class="menu-btn" aria-label="เมนูหลัก" title="เมนูหลัก" type="button">
    <span class="bar"></span>
    <span class="bar mid"></span>
    <span class="bar"></span>
  </button>
  <span class="top-title">Fire Support System</span>
</div>

<div class="tab-bar">
  <button class="tab-btn active" data-app="target">
    <span>TARGET</span><span class="th">เป้าหมาย</span>
  </button>
  <button class="tab-btn" data-app="fo">
    <span>FO</span><span class="th">ผตน.</span>
  </button>
  <button class="tab-btn" data-app="fdc">
    <span>FDC</span><span class="th">ศอย.</span>
  </button>
  <button class="tab-btn" data-app="mortar">
    <span>MORTAR</span><span class="th">สั่งยิง</span>
  </button>
</div>

<div class="main-menu" id="mainMenu" role="navigation" aria-label="เมนูหลัก">
  <button class="menu-item" data-app="target" type="button">
    <span class="icon">T</span><span class="label">Target / เป้าหมาย</span>
  </button>
  <button class="menu-item" data-app="fo" type="button">
    <span class="icon">F</span><span class="label">FO / ผตน.</span>
  </button>
  <button class="menu-item" data-app="fdc" type="button">
    <span class="icon">D</span><span class="label">FDC / ศอย.</span>
  </button>
  <button class="menu-item" data-app="mortar" type="button">
    <span class="icon">M</span><span class="label">Mortar / สั่งยิง</span>
  </button>
  <hr style="border:none;border-top:1px solid rgba(255,255,255,0.03);margin:8px 0">
  <button class="menu-item" data-action="settings" type="button">
    <span class="icon">⚙</span><span class="label">ตั้งค่า</span>
  </button>
  <button class="menu-item" data-action="help" type="button">
    <span class="icon">?</span><span class="label">ช่วยเหลือ</span>
  </button>
</div>
<div class="menu-overlay" id="menuOverlay" tabindex="-1" aria-hidden="true"></div>

<iframe id="appFrame" class="app-frame" sandbox="allow-scripts allow-same-origin allow-modals allow-popups allow-forms"></iframe>

<script>
// --- เมนูหลัก (sidebar) logic ---
(function(){
  var body = document.body;
  var menuBtn = document.getElementById('menuBtn');
  var menuOverlay = document.getElementById('menuOverlay');
  var mainMenu = document.getElementById('mainMenu');
  function openMenu(){ body.classList.add('menu-open'); menuBtn.setAttribute('aria-expanded','true'); menuOverlay.setAttribute('aria-hidden','false'); }
  function closeMenu(){ body.classList.remove('menu-open'); menuBtn.setAttribute('aria-expanded','false'); menuOverlay.setAttribute('aria-hidden','true'); }
  menuBtn.addEventListener('click', function(e){ e.stopPropagation(); if(body.classList.contains('menu-open')) closeMenu(); else openMenu(); });

  menuOverlay.addEventListener('click', function(){ closeMenu(); });

  // ปิดเมนูด้วย Escape
  document.addEventListener('keydown', function(e){
    if(e.key === 'Escape' && body.classList.contains('menu-open')) closeMenu();
  });

  // เมื่อกดเมนู item ให้ trigger tab เดิม (re-use tab buttons)
  var menuItems = mainMenu.querySelectorAll('.menu-item[data-app]');
  menuItems.forEach(function(btn){
    btn.addEventListener('click', function(){
      var app = btn.getAttribute('data-app');
      // หา tab button ที่มี data-app เดียวกัน และคลิกมัน
      var tab = document.querySelector('.tab-bar .tab-btn[data-app="'+app+'"]');
      if(tab) tab.click();
      // อัพสถานะ active ของเมนู
      mainMenu.querySelectorAll('.menu-item').forEach(function(m){ m.classList.remove('active'); });
      btn.classList.add('active');
      closeMenu();
    });
  });

  // ถ้าต้องการให้เมนูอัพเดตเมื่อผู้ใช้กด tab buttons ด้านบน (synchronise)
  var tabBtns = document.querySelectorAll('.tab-bar .tab-btn');
  tabBtns.forEach(function(t){
    t.addEventListener('click', function(){
      var app = t.getAttribute('data-app');
      mainMenu.querySelectorAll('.menu-item').forEach(function(m){
        if(m.getAttribute('data-app') === app) m.classList.add('active'); else m.classList.remove('active');
      });
    });
  });

  // ตั้งค่าเริ่มต้น: เลือกเมนูที่ตรงกับ tab active
  var activeTab = document.querySelector('.tab-bar .tab-btn.active');
  if(activeTab){
    var app = activeTab.getAttribute('data-app');
    var matching = mainMenu.querySelector('.menu-item[data-app="'+app+'"]');
    if(matching) matching.classList.add('active');
  }
})();
</script>

</body>
</html>
